<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII CAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00a82a;
    --green-dark: #003b10;
    --bg: #000d03;
    --panel: #010f05;
    --border: #00ff4133;
    --amber: #ffb800;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 12px var(--green);
  }

  .status {
    font-size: 11px;
    color: var(--green-dim);
    letter-spacing: 2px;
  }

  .status span {
    color: var(--amber);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  #ascii-output {
    flex: 1;
    overflow: hidden;
    padding: 8px 10px;
    line-height: 1.0;
    font-size: 7px;
    letter-spacing: 1px;
    white-space: pre;
    color: var(--green);
    text-shadow: 0 0 3px rgba(0,255,65,0.4);
    background: var(--bg);
    word-break: break-all;
    overflow-wrap: anywhere;
    cursor: default;
    user-select: none;
  }

  #ascii-output.amber { color: var(--amber); text-shadow: 0 0 3px rgba(255,184,0,0.4); }
  #ascii-output.white { color: #e0e0e0; text-shadow: none; }
  #ascii-output.cyan  { color: #00e5ff; text-shadow: 0 0 3px rgba(0,229,255,0.4); }

  aside {
    width: 200px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    padding: 16px 14px;
    gap: 18px;
    overflow-y: auto;
  }

  .ctrl-group label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dim);
    display: block;
    margin-bottom: 6px;
  }

  .ctrl-group input[type=range] {
    width: 100%;
    accent-color: var(--green);
    cursor: pointer;
  }

  .val {
    font-size: 11px;
    color: var(--green);
    float: right;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  button {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  button:hover, button.active {
    background: var(--green-dark);
    border-color: var(--green);
    color: var(--green);
    text-shadow: 0 0 6px var(--green);
  }

  button.danger {
    border-color: #ff3b3b55;
    color: #ff3b3b88;
  }
  button.danger:hover {
    background: #1a0000;
    border-color: #ff3b3b;
    color: #ff3b3b;
    text-shadow: 0 0 6px #ff3b3b;
  }

  #start-btn {
    border-color: var(--green);
    color: var(--green);
    text-shadow: 0 0 6px var(--green);
    font-size: 12px;
    padding: 10px;
    text-align: center;
    letter-spacing: 3px;
  }

  #preview-wrap {
    position: relative;
  }

  video, canvas {
    display: none;
  }

  .stat-line {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .stat-line b {
    color: var(--green);
    font-weight: normal;
  }

  footer {
    padding: 5px 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
  }

  #placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 12px;
    opacity: 0.35;
    font-size: 12px;
    letter-spacing: 3px;
  }

  .big-icon {
    font-size: 48px;
    line-height: 1;
  }
</style>
</head>
<body>

<header>
  <div class="logo">ASCII_CAM</div>
  <div class="status">SYS_READY <span>■</span></div>
</header>

<main>
  <div id="ascii-output">
    <div id="placeholder">
      <div class="big-icon">◉</div>
      <div>PRESS INIT TO BEGIN</div>
    </div>
  </div>

  <aside>
    <button id="start-btn">[ INIT CAM ]</button>

    <div class="ctrl-group">
      <label>RESOLUTION <span class="val" id="res-val">80</span></label>
      <input type="range" id="res" min="40" max="160" step="5" value="80">
    </div>

    <div class="ctrl-group">
      <label>CONTRAST <span class="val" id="cont-val">1.0</span></label>
      <input type="range" id="contrast" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="ctrl-group">
      <label>BRIGHTNESS <span class="val" id="bright-val">0</span></label>
      <input type="range" id="brightness" min="-100" max="100" step="5" value="0">
    </div>

    <div class="ctrl-group">
      <label>CHARSET</label>
      <div class="btn-group">
        <button class="charset-btn active" data-set="detailed">DETAILED</button>
        <button class="charset-btn" data-set="blocks">BLOCKS</button>
        <button class="charset-btn" data-set="minimal">MINIMAL</button>
        <button class="charset-btn" data-set="binary">BINARY</button>
      </div>
    </div>

    <div class="ctrl-group">
      <label>COLOR</label>
      <div class="btn-group">
        <button class="color-btn active" data-color="">GREEN</button>
        <button class="color-btn" data-color="amber">AMBER</button>
        <button class="color-btn" data-color="cyan">CYAN</button>
        <button class="color-btn" data-color="white">WHITE</button>
      </div>
    </div>

    <div class="ctrl-group">
      <label>OPTIONS</label>
      <div class="btn-group">
        <button id="flip-btn">FLIP: ON</button>
        <button id="invert-btn">INVERT: OFF</button>
        <button id="snap-btn">SNAPSHOT</button>
        <button id="stop-btn" class="danger">STOP CAM</button>
      </div>
    </div>

    <div class="stat-line" id="stats">
      FPS: <b id="fps-val">--</b><br>
      COLS: <b id="cols-val">--</b><br>
      ROWS: <b id="rows-val">--</b><br>
      CHARS: <b id="chars-val">--</b>
    </div>
  </aside>
</main>

<footer>
  <span>ASCII_CAM v1.0</span>
  <span id="footer-time"></span>
</footer>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const CHARSETS = {
  detailed: ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$',
  blocks:   ' ░▒▓█',
  minimal:  ' .:-=+*#%@',
  binary:   ' 01'
};

let stream = null;
let animFrame = null;
let running = false;
let flipped = true;
let inverted = false;
let charset = 'detailed';
let lastTime = performance.now();
let frameCount = 0;
let fps = 0;

const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });
const output  = document.getElementById('ascii-output');
const placeholder = document.getElementById('placeholder');

const resSlider   = document.getElementById('res');
const contSlider  = document.getElementById('contrast');
const brightSlider= document.getElementById('brightness');

function updateSliderLabels() {
  document.getElementById('res-val').textContent   = resSlider.value;
  document.getElementById('cont-val').textContent  = parseFloat(contSlider.value).toFixed(1);
  document.getElementById('bright-val').textContent= brightSlider.value;
}

resSlider.addEventListener('input', updateSliderLabels);
contSlider.addEventListener('input', updateSliderLabels);
brightSlider.addEventListener('input', updateSliderLabels);
updateSliderLabels();

document.getElementById('start-btn').addEventListener('click', async () => {
  if (running) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
    video.srcObject = stream;
    await video.play();
    running = true;
    placeholder.style.display = 'none';
    renderLoop();
  } catch(e) {
    output.innerHTML = `\n\n  ERROR: ${e.message}\n  Check camera permissions.`;
  }
});

document.getElementById('stop-btn').addEventListener('click', stopCam);

function stopCam() {
  running = false;
  cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  placeholder.style.display = 'flex';
  output.innerHTML = '';
  output.appendChild(placeholder);
}

document.getElementById('flip-btn').addEventListener('click', function() {
  flipped = !flipped;
  this.textContent = `FLIP: ${flipped ? 'ON' : 'OFF'}`;
  this.classList.toggle('active', flipped);
});

document.getElementById('invert-btn').addEventListener('click', function() {
  inverted = !inverted;
  this.textContent = `INVERT: ${inverted ? 'ON' : 'OFF'}`;
  this.classList.toggle('active', inverted);
});

document.getElementById('snap-btn').addEventListener('click', () => {
  if (!running) return;
  const text = output.innerText;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ascii_snap_${Date.now()}.txt`;
  a.click();
});

document.querySelectorAll('.charset-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.charset-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    charset = this.dataset.set;
  });
});

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    output.className = this.dataset.color;
  });
});

function pixelToChar(brightness) {
  const chars = CHARSETS[charset];
  const idx = inverted
    ? Math.floor((1 - brightness / 255) * (chars.length - 1))
    : Math.floor((brightness / 255) * (chars.length - 1));
  return chars[Math.max(0, Math.min(chars.length - 1, idx))];
}

function renderFrame() {
  if (!running || video.readyState < 2) { animFrame = requestAnimationFrame(renderFrame); return; }

  const cols = parseInt(resSlider.value);
  const aspect = video.videoHeight / video.videoWidth;
  const rows = Math.round(cols * aspect * 0.45);

  canvas.width  = cols;
  canvas.height = rows;

  const contrast   = parseFloat(contSlider.value);
  const brightness = parseInt(brightSlider.value);

  ctx.save();
  ctx.filter = `contrast(${contrast}) brightness(${(brightness + 100) / 100})`;
  if (flipped) {
    ctx.translate(cols, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0, cols, rows);
  ctx.restore();

  const imageData = ctx.getImageData(0, 0, cols, rows).data;
  let result = '';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const lum = 0.299 * imageData[i] + 0.587 * imageData[i+1] + 0.114 * imageData[i+2];
      result += pixelToChar(lum);
    }
    if (y < rows - 1) result += '\n';
  }

  output.textContent = result;

  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 500) {
    fps = Math.round(frameCount * 1000 / (now - lastTime));
    frameCount = 0;
    lastTime = now;
    document.getElementById('fps-val').textContent   = fps;
    document.getElementById('cols-val').textContent  = cols;
    document.getElementById('rows-val').textContent  = rows;
    document.getElementById('chars-val').textContent = (cols * rows).toLocaleString();
  }

  animFrame = requestAnimationFrame(renderFrame);
}

function renderLoop() { animFrame = requestAnimationFrame(renderFrame); }

function updateClock() {
  const now = new Date();
  document.getElementById('footer-time').textContent =
    now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
